name: Sync Upstream

permissions:
  contents: write

on:
  schedule:
    - cron: "*/30 * * * *"

  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream
        run: |
          git remote add upstream https://github.com/D4Vinci/Scrapling.git

      - name: Fetch upstream
        run: |
          git fetch upstream
          git fetch origin

      - name: Sync main
        run: |
          git checkout main
          git merge upstream/main --no-edit
          git push origin main

      - name: Sync dev
        run: |
          git checkout -B dev origin/dev
          git merge upstream/dev --no-edit
          git push origin dev